<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markly — Design Canvas</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; }
  body { background: #f0eee9; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/atoms.jsx"></script>
<script type="text/babel" src="components/AppShell.jsx"></script>
<script type="text/babel" src="components/Landing.jsx"></script>
<script type="text/babel" src="components/Dashboard.jsx"></script>
<script type="text/babel" src="components/AppScreens.jsx"></script>
<script type="text/babel" src="components/AuxScreens.jsx"></script>

<script type="text/babel" data-presets="react">
  const App = () => {
    // Interactive nav state shared across app-shell artboards. Clicking a
    // sidebar item in any artboard switches all of them in concert.
    const [active, setActive] = React.useState('dashboard');
    const go = (id) => setActive(id);

    return (
      <DesignCanvas>
        <DCSection id="marketing" title="Marketing" subtitle="Public-facing pages — landing, docs, sign up">
          <DCArtboard id="landing" label="Landing page" width={1240} height={1800}>
            <Landing />
          </DCArtboard>
          <DCArtboard id="docs" label="Docs" width={1240} height={900}>
            <Docs />
          </DCArtboard>
          <DCArtboard id="signup" label="Sign up" width={1120} height={720}>
            <SignUp />
          </DCArtboard>
        </DCSection>

        <DCSection id="app" title="App" subtitle="Logged-in screens — click sidebar items to switch">
          <DCArtboard id="dashboard" label="Dashboard" width={1280} height={860}>
            <AppShell active={active} onNav={go} title="Dashboard" breadcrumb="Jordan's workspace">
              {active === 'dashboard' && <Dashboard />}
              {active === 'keys' && <ApiKeys />}
              {active === 'playground' && <Playground />}
              {active === 'logs' && <Logs />}
              {active === 'billing' && <Billing />}
              {active === 'settings' && <SettingsAccount />}
            </AppShell>
          </DCArtboard>

          <DCArtboard id="keys" label="API Keys" width={1280} height={720}>
            <AppShell active="keys" onNav={() => {}} title="API Keys" breadcrumb="Settings / API Keys">
              <ApiKeys />
            </AppShell>
          </DCArtboard>

          <DCArtboard id="playground" label="Playground" width={1280} height={860}>
            <AppShell active="playground" onNav={() => {}} title="Playground" breadcrumb="Tools / Playground">
              <Playground />
            </AppShell>
          </DCArtboard>

          <DCArtboard id="logs" label="Logs" width={1280} height={860}>
            <AppShell active="logs" onNav={() => {}} title="Logs" breadcrumb="Tools / Logs">
              <Logs />
            </AppShell>
          </DCArtboard>

          <DCArtboard id="billing" label="Billing" width={1280} height={980}>
            <AppShell active="billing" onNav={() => {}} title="Billing" breadcrumb="Account / Billing">
              <Billing />
            </AppShell>
          </DCArtboard>

          <DCArtboard id="settings" label="Settings · Account" width={1280} height={900}>
            <AppShell active="settings" onNav={() => {}} title="Account" breadcrumb="Settings / Account">
              <SettingsAccount />
            </AppShell>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
